<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mondou Champions</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0D0D0D;height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
.logo{
  font-family:Georgia,serif;font-size:2.8rem;font-weight:600;
  color:#C9963B;letter-spacing:.1em;margin-bottom:.5rem;
}
.sub{font-size:10px;color:#555;letter-spacing:.18em;text-transform:uppercase}
.spinner{
  width:28px;height:28px;
  border:2px solid #222;border-top-color:#C9963B;
  border-radius:50%;animation:spin .7s linear infinite;
  margin:2rem auto 0;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
<script src="mc_core.js"></script>
</head>
<body>
<div class="logo">MONDOU</div>
<div class="sub">Champions</div>
<div class="spinner"></div>
<script>
// Ruta de entrada única — siempre pasa por aquí
// Si hay sesión válida → menu. Si no → login.
(function() {
  const sess = MC_Session.get();
  window.location.href = sess ? 'menu.html' : 'login.html';
})();
</script>
</body>
</html>
